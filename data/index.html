<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESP8266 Dashboard</title>
<link rel="stylesheet" href="/app.css">
</head>

<body>

<div class="wrap">

<div class="card">

<h1>ESP8266 Control</h1>
<p class="sub">LED et WiFi</p>

<div class="status">
<div class="dot" id="dot"></div>
<strong id="state">---</strong>
</div>

<div class="btns">

<button class="btn btn-on" onclick="ledOn()">
ON
</button>

<button class="btn btn-off" onclick="ledOff()">
OFF
</button>

<a class="btn btn-wifi" href="/wifi">
WiFi Scan
</a>

</div>

<div class="toast" id="toast"></div>

</div>

</div>

<script src="/app.js"></script>

</body>
</html>
