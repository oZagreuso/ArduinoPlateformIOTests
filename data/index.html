<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESP8266 Dashboard</title>
<link rel="stylesheet" href="/app.css">
</head>

<body>

<div class="wrap">

<div class="card">

<h1>ESP8266 Control</h1>
<p class="sub">LED et WiFi</p>

<div class="row" style="margin-top:12px">
  <div class="pill">
    <div class="k">Heure (Paris)</div>
    <div class="v" id="clock">—</div>
  </div>
  <div class="pill">
    <div class="k">Date</div>
    <div class="v" id="date">—</div>
  </div>
</div>

<div class="row">

<div class="pill">
<div class="k">Température</div>
<div class="v" id="temp">-- °C</div>
</div>

<div class="pill">
<div class="k">Vent</div>
<div class="v" id="wind">-- km/h</div>
</div>

</div>

<div class="status">
<div class="dot" id="dot"></div>
<strong id="state">---</strong>
</div>

<div class="btns">

<button class="btn btn-on" onclick="ledOn()">
ON
</button>

<button class="btn btn-off" onclick="ledOff()">
OFF
</button>

<div class="row" style="margin-top:14px">
  <div class="pill">
    <div class="k">Uptime</div>
    <div class="v" id="uptime">—</div>
  </div>
  <div class="pill">
    <div class="k">Heap libre</div>
    <div class="v" id="heap">—</div>
  </div>
</div>

<div class="row" style="margin-top:12px">
  <div class="pill">
    <div class="k">Wi-Fi (RSSI)</div>
    <div class="v" id="sys_rssi">—</div>
  </div>
  <div class="pill">
    <div class="k">Reset reason</div>
    <div class="v" id="reset">—</div>
  </div>
</div>

<a class="btn btn-wifi" href="/wifi">
WiFi Scan
</a>

</div>

<div class="toast" id="toast"></div>

</div>

</div>

<script src="/app.js"></script>

</body>
</html>
